[build]
  publish = "."
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  node_bundler = "esbuild"

[functions."generate-questions"]
  timeout = 120

[functions."research-company"]
  timeout = 120

[functions."groq-whisper"]
  timeout = 60

# Redirige /api/* a las Netlify Functions (compatibilidad con rutas del VPS)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirige /apex a la carpeta apex
[[redirects]]
  from = "/apex"
  to = "/apex/index.html"
  status = 200

[[redirects]]
  from = "/apex/*"
  to = "/apex/:splat"
  status = 200

# Redirige /documentacion a la carpeta portal
[[redirects]]
  from = "/documentacion"
  to = "/portal/index.html"
  status = 200

[[redirects]]
  from = "/documentacion/*"
  to = "/portal/:splat"
  status = 200
