<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa 2 — Diccionario Operativo ARMC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../../../shared/fonts/phosphor/phosphor.css">
    <style>
        :root {
            --prisma-navy: #101B2C;
            --bg-primary: #172436;
            --bg-side: #0f1724;
            --tech-cyan: #31BEEF;
            --soft-blue: #A1B8F2;
            --clinical-white: #FAF9F6;
            --muted: #93A6BF;
            --border: rgba(161, 184, 242, 0.18);
            --hover: rgba(49, 190, 239, 0.08);
            --active: rgba(49, 190, 239, 0.18);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; background: var(--prisma-navy); color: var(--clinical-white); font-family: 'Source Sans 3', sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; }

        aside.sidebar {
            width: 280px;
            flex: 0 0 280px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .side-head {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
        }
        .side-head h2 {
            margin: 0 0 10px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            color: var(--tech-cyan);
            font-weight: 700;
        }
        .search-box {
            position: relative;
        }
        .search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }
        .search-box input {
            width: 100%;
            padding: 8px 10px 8px 32px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--clinical-white);
            font-family: inherit;
            font-size: 0.86rem;
            outline: none;
        }
        .search-box input:focus { border-color: var(--tech-cyan); }

        .side-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0 20px;
        }
        .cat {
            padding: 0;
        }
        .cat-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--soft-blue);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
        }
        .cat-head:hover { color: var(--clinical-white); }
        .cat-head .chev { font-size: 0.85rem; transition: transform 0.18s; }
        .cat.collapsed .chev { transform: rotate(-90deg); }
        .cat.collapsed .cat-items { display: none; }
        .cat-count { margin-left: auto; color: var(--muted); font-weight: 600; font-size: 0.74rem; }
        .cat-items { padding: 2px 0 8px; }
        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 16px 7px 32px;
            font-size: 0.86rem;
            color: #d7e3f2;
            cursor: pointer;
            border-left: 2px solid transparent;
            font-family: ui-monospace, SFMono-Regular, monospace;
        }
        .item:hover { background: var(--hover); }
        .item.active {
            background: var(--active);
            border-left-color: var(--tech-cyan);
            color: var(--clinical-white);
        }
        .item i { font-size: 0.9rem; color: var(--muted); }
        .item.active i { color: var(--tech-cyan); }

        main.detail {
            flex: 1;
            overflow-y: auto;
            padding: 28px 36px 48px;
        }
        .detail-head {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .detail-kicker {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--tech-cyan);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .detail-title {
            margin: 6px 0 12px;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.6rem;
            color: var(--clinical-white);
        }
        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(49, 190, 239, 0.1);
            border: 1px solid rgba(49, 190, 239, 0.2);
            color: var(--tech-cyan);
            font-size: 0.74rem;
            font-weight: 600;
            font-family: ui-monospace, SFMono-Regular, monospace;
        }
        .chip.soft {
            background: rgba(161, 184, 242, 0.08);
            border-color: rgba(161, 184, 242, 0.2);
            color: var(--soft-blue);
        }

        section.block { margin-top: 26px; }
        section.block h3 {
            margin: 0 0 12px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.84rem;
            color: var(--tech-cyan);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        table.data {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        table.data th, table.data td {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(161,184,242,0.1);
            vertical-align: top;
        }
        table.data th {
            color: var(--soft-blue);
            font-weight: 600;
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        table.data td { color: #d7e3f2; }
        table.data tbody tr:hover { background: rgba(255,255,255,0.02); }
        table.data code {
            font-family: ui-monospace, SFMono-Regular, monospace;
            background: rgba(255,255,255,0.04);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.84rem;
            color: var(--tech-cyan);
        }
        .yes { color: #9ad29a; font-weight: 600; }
        .no { color: var(--muted); }

        ul.simple {
            margin: 0;
            padding-left: 18px;
            color: #d7e3f2;
            font-size: 0.9rem;
            line-height: 1.55;
        }
        ul.simple li + li { margin-top: 4px; }

        .panel-filter {
            margin: 0 0 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .panel-filter input {
            flex: 1;
            padding: 7px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--clinical-white);
            font-family: inherit;
            font-size: 0.88rem;
            outline: none;
        }
        .panel-filter input:focus { border-color: var(--tech-cyan); }
        .panel-filter .count { color: var(--muted); font-size: 0.82rem; }

        .empty {
            color: var(--muted);
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(161, 184, 242, 0.1);
            border: 1px solid rgba(161, 184, 242, 0.2);
            color: var(--soft-blue);
            font-size: 0.72rem;
            margin: 2px 4px 2px 0;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside.sidebar { width: 100%; flex: 0 0 auto; max-height: 40vh; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="side-head">
            <h2><i class="ph ph-book-bookmark"></i> Diccionario ARMC</h2>
            <div class="search-box">
                <i class="ph ph-magnifying-glass"></i>
                <input id="search" type="text" placeholder="Buscar…" autocomplete="off">
            </div>
        </div>
        <nav class="side-tree" id="tree"></nav>
    </aside>

    <main class="detail" id="detail">
        <div class="empty">Cargando…</div>
    </main>

    <script>
        const FORM_FILES = ['web-contact-form', 'lead-capture'];
        const EVENT_FILES = ['lead-captured'];

        const state = {
            catalogo: null,
            forms: [],
            events: [],
            mappings: null,
            tree: [],
            activeId: null,
            collapsed: new Set(),
            search: ''
        };

        async function loadJSON(p) {
            const r = await fetch(p);
            if (!r.ok) throw new Error(p);
            return r.json();
        }

        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function buildTree() {
            const cats = [];

            cats.push({
                id: 'cat-catalogo',
                label: 'Catálogo',
                icon: 'ph-list-bullets',
                items: [
                    { id: 'catalogo-demandas', label: 'Demandas (25)', icon: 'ph-target', kind: 'demandas' },
                    { id: 'catalogo-lineas', label: 'Líneas de servicio (5)', icon: 'ph-stack', kind: 'lineas' }
                ]
            });

            cats.push({
                id: 'cat-forms',
                label: 'Formularios',
                icon: 'ph-clipboard-text',
                items: state.forms.map(f => ({ id: 'form-' + f.id, label: f.id, icon: 'ph-clipboard-text', kind: 'form', payload: f }))
            });

            cats.push({
                id: 'cat-events',
                label: 'Eventos',
                icon: 'ph-lightning',
                items: state.events.map(e => ({ id: 'event-' + e.id, label: e.id, icon: 'ph-lightning', kind: 'event', payload: e }))
            });

            cats.push({
                id: 'cat-mappings',
                label: 'Mapeos',
                icon: 'ph-database',
                items: [
                    { id: 'mappings-forms', label: 'Formularios → BD', icon: 'ph-arrow-right', kind: 'mappings-forms' },
                    { id: 'mappings-events', label: 'Eventos → BD', icon: 'ph-arrow-right', kind: 'mappings-events' }
                ]
            });

            state.tree = cats;
        }

        function matchesSearch(label) {
            if (!state.search) return true;
            return label.toLowerCase().includes(state.search.toLowerCase());
        }

        function renderTree() {
            const tree = document.getElementById('tree');
            tree.innerHTML = state.tree.map(cat => {
                const items = cat.items.filter(it => matchesSearch(it.label));
                if (state.search && items.length === 0) return '';
                const collapsed = state.collapsed.has(cat.id) ? 'collapsed' : '';
                const itemsHtml = items.map(it => {
                    const active = state.activeId === it.id ? 'active' : '';
                    return `<div class="item ${active}" data-id="${it.id}"><i class="ph ${it.icon}"></i><span>${escapeHtml(it.label)}</span></div>`;
                }).join('');
                return `
                    <div class="cat ${collapsed}" data-cat="${cat.id}">
                        <div class="cat-head"><i class="ph ph-caret-down chev"></i><i class="ph ${cat.icon}"></i><span>${cat.label}</span><span class="cat-count">${cat.items.length}</span></div>
                        <div class="cat-items">${itemsHtml}</div>
                    </div>
                `;
            }).join('');

            tree.querySelectorAll('.cat-head').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.parentElement.dataset.cat;
                    if (state.collapsed.has(id)) state.collapsed.delete(id);
                    else state.collapsed.add(id);
                    renderTree();
                });
            });
            tree.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', () => {
                    state.activeId = el.dataset.id;
                    renderTree();
                    renderDetail();
                });
            });
        }

        function findItem(id) {
            for (const c of state.tree) {
                for (const it of c.items) {
                    if (it.id === id) return it;
                }
            }
            return null;
        }

        function renderDetail() {
            const detail = document.getElementById('detail');
            const it = findItem(state.activeId);
            if (!it) { detail.innerHTML = '<div class="empty">Selecciona un item del menú lateral.</div>'; return; }

            if (it.kind === 'demandas') return renderDemandas(detail);
            if (it.kind === 'lineas') return renderLineas(detail);
            if (it.kind === 'form') return renderForm(detail, it.payload);
            if (it.kind === 'event') return renderEvent(detail, it.payload);
            if (it.kind === 'mappings-forms') return renderMappingsForms(detail);
            if (it.kind === 'mappings-events') return renderMappingsEvents(detail);
        }

        function header(kicker, title, chips = []) {
            return `
                <div class="detail-head">
                    <div class="detail-kicker">${kicker}</div>
                    <h1 class="detail-title">${escapeHtml(title)}</h1>
                    <div class="chips">${chips.map(c => `<span class="chip ${c.soft ? 'soft' : ''}">${escapeHtml(c.label)}</span>`).join('')}</div>
                </div>
            `;
        }

        function renderDemandas(host) {
            const rows = state.catalogo.opciones;
            host.innerHTML = header('Catálogo', 'Demandas (25)', [{ label: 'fuente: catalogo-demandas.json', soft: true }]) + `
                <div class="panel-filter">
                    <input id="demandas-filter" placeholder="Filtrar por frase o línea de servicio…" autocomplete="off">
                    <span class="count" id="demandas-count">${rows.length} / ${rows.length}</span>
                </div>
                <table class="data"><thead><tr><th>#</th><th>Frase</th><th>Líneas</th><th>Tratamientos</th></tr></thead><tbody id="demandas-body"></tbody></table>
            `;
            const body = document.getElementById('demandas-body');
            const count = document.getElementById('demandas-count');
            const draw = (q) => {
                const filtered = rows.filter(r => {
                    if (!q) return true;
                    const t = q.toLowerCase();
                    return r.frase.toLowerCase().includes(t) || r.lineas_servicio.some(l => l.toLowerCase().includes(t));
                });
                body.innerHTML = filtered.map(r => `
                    <tr>
                        <td><code>${r.id}</code></td>
                        <td>${escapeHtml(r.frase)}</td>
                        <td>${r.lineas_servicio.map(l => `<span class="tag">${escapeHtml(l)}</span>`).join('')}</td>
                        <td style="color:#b7c7dd;font-size:0.84rem">${escapeHtml(r.tratamientos)}</td>
                    </tr>
                `).join('') || '<tr><td colspan="4" class="empty">Sin resultados</td></tr>';
                count.textContent = `${filtered.length} / ${rows.length}`;
            };
            draw('');
            document.getElementById('demandas-filter').addEventListener('input', e => draw(e.target.value));
        }

        function renderLineas(host) {
            const lineas = state.catalogo.lineas_servicio;
            host.innerHTML = header('Catálogo', 'Líneas de servicio (5)', [{ label: 'fuente: catalogo-demandas.json', soft: true }]) + `
                <table class="data"><thead><tr><th>Línea</th><th>Descripción</th></tr></thead><tbody>
                ${lineas.map(l => `<tr><td><code>${escapeHtml(l.nombre)}</code></td><td>${escapeHtml(l.descripcion)}</td></tr>`).join('')}
                </tbody></table>
            `;
        }

        function navChip(label, tab, itemId, soft) {
            return `<button type="button" class="chip ${soft ? 'soft' : ''}" style="cursor:pointer;font:inherit" onclick="goTo(${tab}, '${itemId}')"><i class="ph ph-arrow-square-out" style="margin-right:4px;font-size:0.78rem"></i>${escapeHtml(label)}</button>`;
        }

        function goTo(tab, itemId) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'navigate', tab: tab, itemId: itemId }, '*');
            }
        }

        function renderForm(host, f) {
            const chips = [
                { label: 'canal: ' + f.canal },
                { label: 'paso: ' + f.paso, soft: true }
            ];
            if (f.dispara_evento) chips.push({ label: 'evento: ' + f.dispara_evento });
            if (f.salida) chips.push({ label: 'salida: ' + f.salida, soft: true });
            if (f.version) chips.push({ label: 'v' + f.version, soft: true });
            const persist = state.mappings.forms[f.id];
            const traceLinks = [
                navChip('← Capa 1: ' + f.paso, 1, 'node-' + f.paso, false)
            ];
            if (persist) {
                traceLinks.push(navChip('→ Capa 3: ' + persist.tabla_principal, 3, 'table-' + persist.tabla_principal, true));
            }
            host.innerHTML = header('Formulario', f.nombre, chips) + `
                <section class="block">
                    <h3>Trazabilidad</h3>
                    <div class="chips">${traceLinks.join('')}</div>
                </section>`;
            host.innerHTML += `
                <section class="block">
                    <h3>Campos (input de captura)</h3>
                    <table class="data"><thead><tr><th>Nombre</th><th>Tipo</th><th>Obligatorio</th><th>Restricciones</th><th>Ejemplo</th></tr></thead><tbody>
                    ${f.campos.map(c => {
                        const restr = [];
                        if (c.min !== undefined) restr.push('min: ' + c.min);
                        if (c.max !== undefined) restr.push('max: ' + c.max);
                        if (c.min_items !== undefined) restr.push('min items: ' + c.min_items);
                        if (c.max_items !== undefined) restr.push('max items: ' + c.max_items);
                        if (c.pattern) restr.push('pattern: <code>' + escapeHtml(c.pattern) + '</code>');
                        if (c.nullable) restr.push('nullable');
                        if (c.fuente) restr.push('fuente: <code>' + escapeHtml(c.fuente) + '</code>');
                        return '<tr><td><code>' + escapeHtml(c.nombre) + '</code></td>' +
                            '<td>' + escapeHtml(c.tipo) + '</td>' +
                            '<td>' + (c.obligatorio ? '<span class="yes">sí</span>' : '<span class="no">no</span>') + '</td>' +
                            '<td style="font-size:0.82rem;color:#b7c7dd">' + (restr.join(' · ') || '—') + '</td>' +
                            '<td style="font-size:0.82rem;color:#b7c7dd">' + (c.ejemplo !== undefined ? '<code>' + escapeHtml(JSON.stringify(c.ejemplo)) + '</code>' : '—') + '</td></tr>';
                    }).join('')}
                    </tbody></table>
                </section>
                ${f.genera && f.genera.length ? `
                    <section class="block">
                        <h3>Genera (atributos asignados por el sistema)</h3>
                        <table class="data"><thead><tr><th>Nombre</th><th>Tipo</th><th>Descripción</th></tr></thead><tbody>
                        ${f.genera.map(g => `<tr><td><code>${escapeHtml(g.nombre)}</code></td><td>${escapeHtml(g.tipo)}</td><td style="color:#b7c7dd;font-size:0.86rem">${escapeHtml(g.descripcion || '')}</td></tr>`).join('')}
                        </tbody></table>
                    </section>
                ` : ''}
                ${f.derivados && f.derivados.length ? `
                    <section class="block">
                        <h3>Derivados</h3>
                        <table class="data"><thead><tr><th>Nombre</th><th>Origen</th></tr></thead><tbody>
                        ${f.derivados.map(d => `<tr><td><code>${escapeHtml(d.nombre)}</code></td><td>${escapeHtml(d.origen)}</td></tr>`).join('')}
                        </tbody></table>
                    </section>
                ` : ''}
                ${f.reglas && f.reglas.length ? `
                    <section class="block">
                        <h3>Reglas</h3>
                        <ul class="simple">${f.reglas.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>
                    </section>
                ` : ''}
                ${persist ? `
                    <section class="block">
                        <h3>Persistencia</h3>
                        <table class="data"><tbody>
                        <tr><th style="width:200px">Tabla principal</th><td><code>${escapeHtml(persist.tabla_principal)}</code></td></tr>
                        ${persist.tabla_secundaria ? `<tr><th>Tabla secundaria</th><td><code>${escapeHtml(persist.tabla_secundaria)}</code></td></tr>` : ''}
                        <tr><th>Columnas</th><td>${persist.columnas.map(c => `<code>${escapeHtml(c)}</code>`).join(' ')}</td></tr>
                        <tr><th>Eventos asociados</th><td>${persist.eventos.map(e => `<span class="tag">${escapeHtml(e)}</span>`).join('')}</td></tr>
                        </tbody></table>
                    </section>
                ` : ''}
            `;
        }

        function renderEvent(host, e) {
            const origenStr = Array.isArray(e.origen) ? e.origen.join(', ') : e.origen;
            const chips = [
                { label: 'paso: ' + e.paso, soft: true },
                { label: 'origen: ' + origenStr }
            ];
            const eventMap = state.mappings.events[e.id];
            const traceLinks = [navChip('← Capa 1: ' + e.paso, 1, 'node-' + e.paso, false)];
            const origenArr = Array.isArray(e.origen) ? e.origen : (e.origen ? [e.origen] : []);
            origenArr.forEach(o => traceLinks.push(navChip('↑ Form: ' + o, 2, 'form-' + o, false)));
            if (eventMap && eventMap.tablas) {
                eventMap.tablas.forEach(t => traceLinks.push(navChip('→ Capa 3: ' + t, 3, 'table-' + t, true)));
            }
            host.innerHTML = header('Evento', e.id, chips) + `
                <section class="block">
                    <h3>Trazabilidad</h3>
                    <div class="chips">${traceLinks.join('')}</div>
                </section>`;
            host.innerHTML += `
                <section class="block">
                    <h3>Destino</h3>
                    <div>${e.destino.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
                </section>
                <section class="block">
                    <h3>Payload mínimo</h3>
                    <ul class="simple">${e.payload_minimo.map(p => `<li><code>${escapeHtml(p)}</code></li>`).join('')}</ul>
                </section>
                ${e.payload_opcional && e.payload_opcional.length ? `
                    <section class="block">
                        <h3>Payload opcional</h3>
                        <ul class="simple">${e.payload_opcional.map(p => `<li><code>${escapeHtml(p)}</code></li>`).join('')}</ul>
                    </section>
                ` : ''}
            `;
        }

        function renderMappingsForms(host) {
            const entries = Object.entries(state.mappings.forms);
            host.innerHTML = header('Mapeos', 'Formularios → Base de datos', [{ label: 'fuente: mappings.json', soft: true }]) + `
                <table class="data"><thead><tr><th>Formulario</th><th>Tabla principal</th><th>Tabla secundaria</th><th>Eventos</th></tr></thead><tbody>
                ${entries.map(([id, def]) => `
                    <tr>
                        <td><code>${escapeHtml(id)}</code></td>
                        <td><code>${escapeHtml(def.tabla_principal)}</code></td>
                        <td>${def.tabla_secundaria ? `<code>${escapeHtml(def.tabla_secundaria)}</code>` : '<span class="no">—</span>'}</td>
                        <td>${def.eventos.map(e => `<span class="tag">${escapeHtml(e)}</span>`).join('')}</td>
                    </tr>
                `).join('')}
                </tbody></table>
            `;
        }

        function renderMappingsEvents(host) {
            const entries = Object.entries(state.mappings.events);
            host.innerHTML = header('Mapeos', 'Eventos → Base de datos', [{ label: 'fuente: mappings.json', soft: true }]) + `
                <table class="data"><thead><tr><th>Evento</th><th>Tablas</th></tr></thead><tbody>
                ${entries.map(([id, def]) => `
                    <tr>
                        <td><code>${escapeHtml(id)}</code></td>
                        <td>${def.tablas.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</td>
                    </tr>
                `).join('')}
                </tbody></table>
            `;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            state.search = e.target.value;
            renderTree();
        });

        // Listen for cross-tab select messages from shell
        window.addEventListener('message', (e) => {
            const msg = e.data;
            if (!msg || msg.type !== 'select' || !msg.itemId) return;
            if (findItem(msg.itemId)) {
                state.activeId = msg.itemId;
                renderTree();
                renderDetail();
            }
        });

        (async () => {
            try {
                const [catalogo, mappings] = await Promise.all([
                    loadJSON('./catalogo-demandas.json'),
                    loadJSON('./mappings.json')
                ]);
                const forms = await Promise.all(FORM_FILES.map(n => loadJSON('./forms/' + n + '.json')));
                const events = await Promise.all(EVENT_FILES.map(n => loadJSON('./events/' + n + '.json')));
                state.catalogo = catalogo;
                state.mappings = mappings;
                state.forms = forms;
                state.events = events;
                buildTree();
                state.activeId = 'catalogo-demandas';
                renderTree();
                renderDetail();
            } catch (err) {
                document.getElementById('detail').innerHTML = `<div class="empty" style="color:#e56b6f">Error cargando datos: ${err.message}</div>`;
            }
        })();
    </script>
</body>
</html>
