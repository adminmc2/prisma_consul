<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador UX ARMC — PRISMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../shared/fonts/phosphor/phosphor.css">
  <style>
    :root {
      --prisma-navy: #101B2C;
      --bg-primary: #1a2535;
      --tech-cyan: #31BEEF;
      --soft-blue: #A1B8F2;
      --clinical-white: #FAF9F6;
      --border-subtle: rgba(161, 184, 242, 0.18);
    }
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Source Sans 3', sans-serif; background: var(--prisma-navy); color: var(--clinical-white); }
    body { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; overflow: hidden; }
    header.sim-header { flex: 0 0 auto; background: var(--bg-primary); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); gap: 16px; flex-wrap: wrap; }
    .sim-header h1 { font-family: 'Quicksand', sans-serif; margin: 0; font-size: 1.05rem; font-weight: 600; color: var(--clinical-white); display: flex; align-items: center; gap: 10px; letter-spacing: 0.2px; }
    .sim-header h1 i { color: var(--tech-cyan); font-size: 1.25rem; }
    .sim-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .sim-tab { display: inline-flex; align-items: center; gap: 8px; background: transparent; color: var(--soft-blue); border: 1px solid var(--border-subtle); padding: 7px 16px; border-radius: 4px 18px 18px 4px; cursor: pointer; font-family: 'Quicksand', sans-serif; font-size: 0.82rem; font-weight: 600; transition: all 0.18s ease; }
    .sim-tab:hover:not(.active) { color: var(--clinical-white); border-color: var(--soft-blue); }
    .sim-tab.active { background: var(--tech-cyan); color: var(--prisma-navy); border-color: var(--tech-cyan); }
    .sim-tab i { font-size: 1rem; }
    main.sim-main { flex: 1 1 auto; min-height: 0; display: block; background: var(--prisma-navy); }
    .view { width: 100%; height: 100%; display: none; }
    .view.active { display: block; }
    .view iframe { width: 100%; height: 100%; border: none; background: var(--prisma-navy); }
    .view-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 2rem; }
    .view-placeholder i { font-size: 2.6rem; color: var(--tech-cyan); margin-bottom: 1rem; }
    .view-placeholder h2 { font-family: 'Quicksand', sans-serif; color: var(--clinical-white); font-size: 1.4rem; font-weight: 600; margin: 0 0 0.6rem; }
    .view-placeholder p { color: var(--soft-blue); max-width: 540px; line-height: 1.55; font-size: 0.95rem; }
  </style>
</head>
<body>
  <header class="sim-header">
    <h1><i class="ph ph-intersect"></i> Simulador UX ARMC</h1>
    <div class="sim-tabs" role="tablist">
      <button class="sim-tab active" data-view="1" onclick="switchView('1')"><i class="ph ph-tree-structure"></i> Capa 1: UX</button>
      <button class="sim-tab" data-view="2" onclick="switchView('2')"><i class="ph ph-book-bookmark"></i> Capa 2: Diccionario</button>
      <button class="sim-tab" data-view="3" onclick="switchView('3')"><i class="ph ph-database"></i> Capa 3: BD (SQL)</button>
    </div>
  </header>

  <main class="sim-main">
    <div id="view-1" class="view active">
      <iframe src="./capa-1-ux/index.html" title="Capa 1: UX"></iframe>
    </div>
    <div id="view-2" class="view">
      <iframe src="./capa-2-diccionario/index.html" title="Capa 2: Diccionario"></iframe>
    </div>
    <div id="view-3" class="view">
      <iframe src="./capa-3-sql/index.html" title="Capa 3: BD (SQL)"></iframe>
    </div>
  </main>

  <script>
    function switchView(id) {
      document.querySelectorAll('.sim-tab').forEach(b => b.classList.toggle('active', b.dataset.view === id));
      document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + id));
    }
  </script>
</body>
</html>
