<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador UX ARMC — Capa 1</title>
    <link rel="stylesheet" href="../../../../../shared/fonts/phosphor/phosphor.css">
    <style>
        :root {
            --prisma-navy: #101B2C;
            --bg-primary: #172436;
            --panel-2: #0f1724;
            --tech-cyan: #31BEEF;
            --soft-blue: #A1B8F2;
            --clinical-white: #FAF9F6;
            --muted: #93A6BF;
            --border: rgba(161, 184, 242, 0.18);
            --danger: #e56b6f;
            --success: #9ad29a;
            --warning: #f4bf75;
        }

        * { box-sizing: border-box; }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: "Source Sans 3", "Segoe UI", sans-serif;
            background: #00ffff; /* DEBUG: capa-1 body = CYAN */
            color: var(--clinical-white);
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: var(--bg-primary);
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            z-index: 10;
        }

        .header-copy h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-copy p {
            margin: 6px 0 0;
            font-size: 0.86rem;
            color: var(--muted);
        }

        .ghost-button,
        .option-btn {
            font: inherit;
        }

        .ghost-button {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--clinical-white);
            border-radius: 4px 18px 18px 4px;
            padding: 9px 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .ghost-button:hover {
            border-color: var(--tech-cyan);
            color: var(--tech-cyan);
        }

        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        #canvas-wrapper {
            position: relative;
            flex: 1;
            overflow: auto;
            cursor: grab;
            background:
                radial-gradient(circle at 1px 1px, rgba(161, 184, 242, 0.12) 1px, transparent 0),
                linear-gradient(180deg, rgba(16, 27, 44, 0.96), rgba(26, 37, 53, 0.96));
            background-size: 26px 26px, auto;
        }
        #canvas-wrapper.panning { cursor: grabbing; }

        /* Lienzo sin barras de scroll: la navegación es por arrastre (pan) + zoom.
           Se elimina el marco/barra inferior; el desplazamiento es libre por el fondo. */
        #canvas-wrapper { scrollbar-width: none; -ms-overflow-style: none; }
        #canvas-wrapper::-webkit-scrollbar { width: 0; height: 0; display: none; }

        #canvas {
            position: relative;
            min-width: 3600px;
            min-height: 1800px;
            transform-origin: 0 0;
            transition: transform 0.1s ease-out;
        }

        svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .link {
            fill: none;
            stroke: rgba(161, 184, 242, 0.45);
            stroke-width: 2;
            transition: stroke 0.3s, stroke-width 0.3s;
        }

        .link.active {
            stroke: var(--tech-cyan);
            stroke-width: 3;
            filter: drop-shadow(0 0 8px rgba(49, 190, 239, 0.5));
        }

        .link.error {
            stroke: var(--danger);
            stroke-width: 4;
            stroke-dasharray: 6 6;
        }

        .node {
            position: absolute;
            width: 360px;
            background: rgba(15, 23, 36, 0.94);
            color: var(--clinical-white);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
            z-index: 2;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, opacity 0.2s;
            overflow: hidden;
        }

        .node.active {
            border-color: rgba(49, 190, 239, 0.7);
            box-shadow: 0 0 0 2px rgba(49, 190, 239, 0.12), 0 18px 34px rgba(0, 0, 0, 0.28);
            transform: translateY(-2px);
        }

        .node.disabled {
            opacity: 0.55;
            filter: grayscale(0.2);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            background: linear-gradient(135deg, rgba(49, 190, 239, 0.14), rgba(161, 184, 242, 0.08));
            border-bottom: 1px solid var(--border);
            cursor: grab;
        }

        .node-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .node-title i {
            color: var(--tech-cyan);
            font-size: 1.05rem;
        }

        .node-id {
            font-size: 0.69rem;
            color: var(--soft-blue);
            background: rgba(16, 27, 44, 0.9);
            padding: 3px 8px;
            border-radius: 999px;
        }

        .node-body {
            padding: 16px;
        }

        .node-key-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--soft-blue);
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.7rem;
        }

        .node-description {
            margin: 0;
            color: #d6dfeb;
            font-size: 0.9rem;
            line-height: 1.45;
        }

        .node-data {
            margin-top: 14px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(161, 184, 242, 0.14);
        }

        .node-data strong {
            display: block;
            margin-bottom: 8px;
            color: var(--tech-cyan);
            font-size: 0.8rem;
        }

        .node-data ul {
            margin: 0;
            padding-left: 18px;
            color: #dce7f7;
            font-size: 0.84rem;
            line-height: 1.45;
        }

        .node-data li + li {
            margin-top: 4px;
        }

        .node-note {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: rgba(49, 190, 239, 0.08);
            border: 1px solid rgba(49, 190, 239, 0.16);
            color: #dce7f7;
            font-size: 0.82rem;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
        }

        .option-btn {
            width: 100%;
            border: 1px solid rgba(161, 184, 242, 0.2);
            background: rgba(255, 255, 255, 0.04);
            color: var(--clinical-white);
            border-radius: 10px;
            padding: 11px 14px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: border-color 0.18s, background 0.18s, transform 0.18s;
        }

        .option-btn:hover {
            border-color: rgba(49, 190, 239, 0.7);
            background: rgba(49, 190, 239, 0.1);
            transform: translateX(2px);
        }

        .option-btn.selected {
            background: rgba(49, 190, 239, 0.16);
            border-color: rgba(49, 190, 239, 0.9);
        }

        .terminal-copy {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px dashed rgba(161, 184, 242, 0.18);
            color: var(--muted);
            font-size: 0.82rem;
            text-align: center;
        }

        #console-panel {
            width: 360px;
            background: #111827;
            border-left: 1px solid rgba(161, 184, 242, 0.15);
            display: flex;
            flex-direction: column;
        }

        .console-header {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(161, 184, 242, 0.12);
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.8rem;
            color: var(--soft-blue);
        }

        .console-header button {
            border: none;
            background: transparent;
            color: var(--tech-cyan);
            cursor: pointer;
            font: inherit;
        }

        #logs {
            flex: 1;
            overflow: auto;
            padding: 12px;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.76rem;
        }

        .log-entry {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(161, 184, 242, 0.12);
            line-height: 1.45;
        }

        .log-time {
            color: #7b8aa0;
            margin-right: 6px;
        }

        .log-info { color: #d7e0ed; }
        .log-success { color: var(--success); }
        .log-warning { color: var(--warning); }
        .log-error { color: var(--danger); }

        .log-db {
            display: block;
            margin-top: 6px;
            padding: 6px 8px;
            border-radius: 8px;
            background: rgba(49, 190, 239, 0.08);
            color: var(--tech-cyan);
            white-space: pre-wrap;
        }

        .zoom-toolbar {
            position: fixed;
            left: 18px;
            bottom: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border-radius: 12px;
            background: rgba(15, 23, 36, 0.9);
            border: 1px solid rgba(161, 184, 242, 0.16);
            z-index: 20;
        }

        .zoom-toolbar button {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--clinical-white);
            cursor: pointer;
        }

        .zoom-toolbar button:hover {
            background: rgba(49, 190, 239, 0.16);
            color: var(--tech-cyan);
        }

        .zoom-level {
            min-width: 54px;
            text-align: center;
            color: var(--soft-blue);
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.76rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-copy">
            <h1><i class="ph ph-tree-structure"></i> Simulador UX ARMC · Capa 1</h1>
            <p>Mapa de estados y decisiones. La especificación de formularios y campos vive en el diccionario operativo de la Capa 2.</p>
        </div>
        <button class="ghost-button" type="button" onclick="resetSimulation()"><i class="ph ph-arrow-counter-clockwise"></i> Reiniciar</button>
    </header>

    <main>
        <div id="canvas-wrapper">
            <div id="canvas">
                <svg id="svg-paths">
                    <defs>
                        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(161, 184, 242, 0.45)"></path>
                        </marker>
                        <marker id="arrow-active" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#31BEEF"></path>
                        </marker>
                        <marker id="arrow-error" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
                            <path d="M 0 0 L 10 5 L 0 10 z" fill="#e56b6f"></path>
                        </marker>
                    </defs>
                </svg>
                <div id="nodes-container"></div>
            </div>
        </div>

        <aside id="console-panel">
            <div class="console-header">
                <span>Terminal del sistema</span>
                <button type="button" onclick="clearLogs()">[Limpiar]</button>
            </div>
            <div id="logs"></div>
        </aside>
    </main>

    <div class="zoom-toolbar">
        <button type="button" title="Reducir" onclick="zoomBy(-0.1)">−</button>
        <span class="zoom-level" id="zoomLevel" title="Restablecer zoom" onclick="zoomReset()" style="cursor:pointer">100%</span>
        <button type="button" title="Ampliar" onclick="zoomBy(0.1)">+</button>
        <button type="button" title="Pantalla completa" onclick="toggleFullscreen()"><i class="ph ph-corners-out"></i></button>
    </div>

    <script>
        const nodesData = {
            lead_entry_channel: {
                title: 'Entrada del lead',
                key: 'LEAD_ENTRY_CHANNEL',
                x: 120,
                y: 420,
                width: 390,
                description: 'El flujo comienza cuando se recibe un nuevo lead por uno de los canales habilitados.',
                dataPoints: [
                    'Canal disponible: Formulario de contacto web',
                    'Canal disponible: WhatsApp',
                    'Estado: pendiente de selección de canal',
                    'Sin persistencia hasta la selección'
                ],
                actions: [
                    {
                        id: 'route-entry-web',
                        label: 'Formulario de contacto web',
                        targetId: 'web_contact_form_received',
                        dbAction: 'Sin persistencia todavía: se representa la recepción del lead desde el formulario de contacto web.'
                    },
                    {
                        id: 'route-entry-whatsapp',
                        label: 'WhatsApp',
                        targetId: 'lead_capture_whatsapp',
                        dbAction: 'Sin persistencia todavía: se fija solo la bifurcación visual por canal WhatsApp.'
                    }
                ]
            },
            web_contact_form_received: {
                title: 'Contacto web recibido',
                key: 'WEB_CONTACT_FORM_RECEIVED',
                x: 900,
                y: 110,
                width: 340,
                description: 'Se registra un contacto entrante desde la web con los datos básicos del lead.',
                dataPoints: [
                    'Canal origen: WEB_FORM',
                    'Origen: formulario de contacto web',
                    'Datos básicos recibidos',
                    'Ingreso al flujo inicial'
                ],
                note: 'Aquí se registra la entrada del contacto antes del siguiente paso operativo.',
                crossLinks: [
                    { label: 'Ver contrato web_contact_form en Capa 2', tab: 2, itemId: 'form-web_contact_form' }
                ],
                actions: [
                    {
                        id: 'register-lead-web',
                        label: 'Registrar lead capturado',
                        targetId: 'lead_captured',
                        dbAction: "INSERT armc_leads(canal_origen='WEB_FORM', ...) RETURNING id; INSERT armc_events(lead_id=[id], event_type='LEAD_CAPTURED');"
                    }
                ]
            },
            lead_capture_whatsapp: {
                title: 'Contacto por WhatsApp recibido',
                key: 'LEAD_CAPTURE_WHATSAPP',
                x: 900,
                y: 860,
                width: 340,
                description: 'Se registra un contacto entrante por WhatsApp con el contexto inicial disponible.',
                dataPoints: [
                    'Canal origen: WHATSAPP',
                    'Origen: conversación de WhatsApp',
                    'Contexto inicial recibido',
                    'Ingreso al flujo inicial'
                ],
                note: 'Aquí se registra la entrada del contacto antes del siguiente paso operativo.',
                crossLinks: [
                    { label: 'Ver contrato lead_capture en Capa 2', tab: 2, itemId: 'form-lead_capture' }
                ],
                actions: [
                    {
                        id: 'register-lead-whatsapp',
                        label: 'Registrar lead capturado',
                        targetId: 'lead_captured',
                        dbAction: "INSERT armc_leads(canal_origen='WHATSAPP', ...) RETURNING id; INSERT armc_events(lead_id=[id], event_type='LEAD_CAPTURED');"
                    }
                ]
            },
            lead_captured: {
                title: 'Lead capturado',
                key: 'LEAD_CAPTURED',
                x: 1700,
                y: 480,
                width: 360,
                description: 'Convergencia: el lead queda registrado en el sistema con un id único, independientemente del canal de entrada.',
                dataPoints: [
                    'id único asignado por el sistema',
                    'estado: LEAD_CAPTURED',
                    'canal_origen preservado',
                    'fecha_primer_contacto registrada',
                    'evento LEAD_CAPTURED emitido'
                ],
                terminalCopy: 'Lead capturado en el sistema.',
                crossLinks: [
                    { label: 'Ver evento LEAD_CAPTURED en Capa 2', tab: 2, itemId: 'event-LEAD_CAPTURED' },
                    { label: 'Ver tabla armc_leads en Capa 3', tab: 3, itemId: 'table-armc_leads' }
                ],
                actions: []
            },
        };

        const container = document.getElementById('nodes-container');
        const svgPath = document.getElementById('svg-paths');
        const logsBox = document.getElementById('logs');
        let zoomLevel = 1;
        let activePathIds = [];
        const ZOOM_MIN = 0.3;
        const ZOOM_MAX = 2;

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function log(message, type = 'info', dbAction = '') {
            const div = document.createElement('div');
            const toneClass = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : type === 'warning' ? 'log-warning' : 'log-info';
            let html = '<span class="' + toneClass + '">' + escapeHtml(message) + '</span>';
            if (dbAction) {
                html += '<span class="log-db">' + escapeHtml(dbAction) + '</span>';
            }
            div.className = 'log-entry';
            div.innerHTML = html;
            logsBox.appendChild(div);
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        function clearLogs() {
            logsBox.innerHTML = '';
        }

        function getIconForNode(key) {
            if (key.includes('LEAD')) return 'ph ph-user-plus';
            if (key.includes('AUTO')) return 'ph ph-robot';
            if (key.includes('HUMAN')) return 'ph ph-headset';
            if (key.includes('SUPER')) return 'ph ph-clipboard-text';
            if (key.includes('USUARIO')) return 'ph ph-check-circle';
            return 'ph ph-hourglass-medium';
        }

        function applyZoom() {
            const canvas = document.getElementById('canvas');
            const label = document.getElementById('zoomLevel');
            canvas.style.transform = 'scale(' + zoomLevel + ')';
            label.textContent = Math.round(zoomLevel * 100) + '%';
        }

        function zoomBy(delta) {
            zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel + delta));
            applyZoom();
        }

        function zoomReset() {
            zoomLevel = 1;
            applyZoom();
        }

        function toggleFullscreen() {
            const doc = document;
            const el = doc.documentElement;
            if (!doc.fullscreenElement) {
                (el.requestFullscreen || el.webkitRequestFullscreen || (() => {})).call(el);
            } else {
                (doc.exitFullscreen || doc.webkitExitFullscreen || (() => {})).call(doc);
            }
        }

        function attachDrag(nodeEl, data) {
            const header = nodeEl.querySelector('.node-header');
            header.addEventListener('mousedown', (event) => {
                event.preventDefault();
                header.style.cursor = 'grabbing';
                let startX = event.clientX;
                let startY = event.clientY;

                const onMouseMove = (moveEvent) => {
                    const scale = zoomLevel > 0 ? zoomLevel : 1;
                    const deltaX = (moveEvent.clientX - startX) / scale;
                    const deltaY = (moveEvent.clientY - startY) / scale;
                    data.x += deltaX;
                    data.y += deltaY;
                    nodeEl.style.left = data.x + 'px';
                    nodeEl.style.top = data.y + 'px';
                    startX = moveEvent.clientX;
                    startY = moveEvent.clientY;
                    drawLines();
                };

                const onMouseUp = () => {
                    header.style.cursor = 'grab';
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        function renderDataBlock(body, data) {
            if (!data.dataPoints || !data.dataPoints.length) {
                return;
            }

            const block = document.createElement('div');
            block.className = 'node-data';

            const title = document.createElement('strong');
            title.textContent = 'Campos o contexto visible';
            block.appendChild(title);

            const list = document.createElement('ul');
            data.dataPoints.forEach((item) => {
                const li = document.createElement('li');
                li.textContent = item;
                list.appendChild(li);
            });
            block.appendChild(list);
            body.appendChild(block);

            if (data.note) {
                const note = document.createElement('div');
                note.className = 'node-note';
                note.textContent = data.note;
                body.appendChild(note);
            }
        }

        function createActionButton(nodeId, action) {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'option-btn';
            button.id = 'btn-' + action.id;
            button.innerHTML = '<span>' + escapeHtml(action.label) + '</span><i class="ph ph-arrow-right"></i>';
            button.addEventListener('click', () => {
                handleAction(nodeId, action.id, action.targetId, action.dbAction || '');
            });
            return button;
        }

        function renderCrossLinks(body, data) {
            if (!data.crossLinks || !data.crossLinks.length) return;
            const wrap = document.createElement('div');
            wrap.style.cssText = 'margin-top:12px;display:flex;flex-direction:column;gap:6px';
            data.crossLinks.forEach((cl) => {
                const a = document.createElement('button');
                a.type = 'button';
                a.style.cssText = 'background:rgba(49,190,239,0.08);border:1px solid rgba(49,190,239,0.3);color:var(--tech-cyan);padding:8px 12px;border-radius:8px;cursor:pointer;font:inherit;font-size:0.82rem;text-align:left;display:flex;align-items:center;gap:8px';
                a.innerHTML = '<i class="ph ph-arrow-square-out"></i><span>' + escapeHtml(cl.label) + '</span>';
                a.addEventListener('click', () => {
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage({ type: 'navigate', tab: cl.tab, itemId: cl.itemId }, '*');
                    }
                });
                wrap.appendChild(a);
            });
            body.appendChild(wrap);
        }

        function renderActions(body, nodeId, data) {
            if (!data.actions.length) {
                const terminal = document.createElement('div');
                terminal.className = 'terminal-copy';
                terminal.textContent = data.terminalCopy || '(Punto final de este flujo)';
                body.appendChild(terminal);
                renderCrossLinks(body, data);
                return;
            }

            const list = document.createElement('div');
            list.className = 'options-list';
            data.actions.forEach((action) => {
                list.appendChild(createActionButton(nodeId, action));
            });
            body.appendChild(list);
            renderCrossLinks(body, data);
        }

        function renderNodes() {
            container.innerHTML = '';

            Object.entries(nodesData).forEach(([nodeId, data]) => {
                const nodeEl = document.createElement('div');
                nodeEl.className = 'node';
                nodeEl.id = 'node-' + nodeId;
                nodeEl.style.left = data.x + 'px';
                nodeEl.style.top = data.y + 'px';
                nodeEl.style.width = (data.width || 360) + 'px';

                const header = document.createElement('div');
                header.className = 'node-header';
                header.innerHTML = '<div class="node-title"><i class="' + getIconForNode(data.key) + '"></i><span>' + escapeHtml(data.title) + '</span></div><span class="node-id">#' + escapeHtml(nodeId) + '</span>';

                const body = document.createElement('div');
                body.className = 'node-body';
                body.innerHTML = '<div class="node-key-badge">key: ' + escapeHtml(data.key) + '</div><p class="node-description">' + escapeHtml(data.description) + '</p>';

                renderDataBlock(body, data);
                renderActions(body, nodeId, data);

                nodeEl.appendChild(header);
                nodeEl.appendChild(body);
                attachDrag(nodeEl, data);
                container.appendChild(nodeEl);
            });
        }

        function applyActivePathState() {
            activePathIds.forEach((pathId) => {
                const pathEl = document.getElementById(pathId);
                if (!pathEl) return;
                pathEl.classList.add('active');
                pathEl.setAttribute('marker-end', 'url(#arrow-active)');
            });
        }

        function drawLines() {
            const defs = svgPath.querySelector('defs').outerHTML;
            const lines = [];

            Object.entries(nodesData).forEach(([, data]) => {
                data.actions.forEach((action) => {
                    const button = document.getElementById('btn-' + action.id);
                    const targetNode = document.getElementById('node-' + action.targetId);
                    if (!button || !targetNode) return;

                    const buttonRect = button.getBoundingClientRect();
                    const canvasRect = svgPath.getBoundingClientRect();
                    const targetRect = targetNode.getBoundingClientRect();

                    const startX = (buttonRect.right - canvasRect.left) + 2;
                    const startY = (buttonRect.top - canvasRect.top) + (buttonRect.height / 2);
                    const endX = (targetRect.left - canvasRect.left) - 6;
                    const endY = (targetRect.top - canvasRect.top) + 26;
                    const curveFactor = Math.max(100, Math.abs(endX - startX) / 3);
                    const pathId = 'path-' + action.id + '-to-' + action.targetId;
                    const d = 'M ' + startX + ' ' + startY + ' C ' + (startX + curveFactor) + ' ' + startY + ', ' + (endX - curveFactor) + ' ' + endY + ', ' + endX + ' ' + endY;
                    lines.push('<path id="' + pathId + '" class="link" d="' + d + '" marker-end="url(#arrow)"></path>');
                });
            });

            svgPath.innerHTML = defs + lines.join('');
            applyActivePathState();
        }

        function focusNode(nodeId) {
            document.querySelectorAll('.node').forEach((node) => {
                node.classList.remove('active');
                node.classList.add('disabled');
            });

            const currentNode = document.getElementById('node-' + nodeId);
            if (currentNode) {
                currentNode.classList.remove('disabled');
                currentNode.classList.add('active');
                const wrapper = document.getElementById('canvas-wrapper');
                const scrollLeft = Math.max(currentNode.offsetLeft - 100, 0);
                const scrollTop = Math.max(currentNode.offsetTop - Math.round(wrapper.clientHeight * 0.25), 0);
                wrapper.scrollTo({ left: scrollLeft, top: scrollTop, behavior: 'smooth' });
            }
        }

        function handleAction(sourceNodeId, actionId, targetId, dbAction) {
            const pathId = 'path-' + actionId + '-to-' + targetId;
            const button = document.getElementById('btn-' + actionId);
            if (button) {
                button.classList.add('selected');
            }

            if (!document.getElementById('node-' + targetId)) {
                const pathEl = document.getElementById(pathId);
                log('Ruta invalida: el nodo destino no existe en el mapa.', 'error');
                if (pathEl) {
                    pathEl.classList.add('error');
                    pathEl.setAttribute('marker-end', 'url(#arrow-error)');
                }
                return;
            }

            if (!activePathIds.includes(pathId)) {
                activePathIds.push(pathId);
            }
            applyActivePathState();

            log('Decision ejecutada desde ' + nodesData[sourceNodeId].key + ' hacia ' + nodesData[targetId].key + '.', 'info', dbAction);
            focusNode(targetId);
            log('Nodo activo: ' + nodesData[targetId].title, 'success');
        }

        function resetSimulation() {
            activePathIds = [];
            clearLogs();
            renderNodes();
            drawLines();
            focusNode('lead_entry_channel');
            log('Sistema reiniciado. Capa 1 vuelve al modo simulador con arranque por canal web y WhatsApp.', 'warning');
        }

        document.addEventListener('wheel', (event) => {
            if (!(event.ctrlKey || event.metaKey)) return;
            event.preventDefault();
            zoomBy(event.deltaY < 0 ? 0.1 : -0.1);
        }, { passive: false });

        // Pan libre: arrastrar el fondo del lienzo desplaza la vista (estilo Miro).
        // Solo se activa sobre zona vacía; el arrastre de nodos sigue capturado por .node-header.
        (() => {
            const wrapper = document.getElementById('canvas-wrapper');
            if (!wrapper) return;
            wrapper.addEventListener('mousedown', (event) => {
                if (event.button !== 0) return;
                if (event.target.closest('.node')) return;
                event.preventDefault();
                wrapper.classList.add('panning');
                const startX = event.clientX;
                const startY = event.clientY;
                const startLeft = wrapper.scrollLeft;
                const startTop = wrapper.scrollTop;

                const onMove = (moveEvent) => {
                    wrapper.scrollLeft = startLeft - (moveEvent.clientX - startX);
                    wrapper.scrollTop = startTop - (moveEvent.clientY - startY);
                };
                const onUp = () => {
                    wrapper.classList.remove('panning');
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        })();

        window.addEventListener('resize', () => {
            setTimeout(drawLines, 50);
        });

        // Listen for cross-tab select messages from shell (focus a node)
        window.addEventListener('message', (e) => {
            const msg = e.data;
            if (!msg || msg.type !== 'select' || !msg.itemId) return;
            // itemId format expected: "node-<nodeId>"
            const m = String(msg.itemId).match(/^node-(.+)$/);
            if (m && nodesData[m[1]]) focusNode(m[1]);
        });

        window.onload = () => {
            renderNodes();
            setTimeout(() => {
                drawLines();
                resetSimulation();
            }, 40);
        };
    </script>
</body>
</html>
